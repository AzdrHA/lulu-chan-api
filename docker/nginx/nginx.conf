events {
  worker_connections  4096;  ## Default: 1024
}

http {
    # API
    server {
        server_name localhost;

        access_log /srv/app/logs/nginx/access.log;
        error_log /srv/app/logs/nginx/error.log;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://node_api:8000;
        }

#         listen 443 ssl;
#
#         ssl_certificate /srv/app/ssl/certs/fullchain.key;
#         ssl_certificate_key /srv/app/ssl/certs/privkey.crt;
#         ssl_dhparam /srv/app/ssl/certs/ssl-dhparams.pem;
#
#         ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
#         ssl_prefer_server_ciphers on;
#         ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
#         ssl_ecdh_curve secp384r1;
#         ssl_session_cache shared:SSL:10m;
#         ssl_session_tickets off;
#         ssl_stapling on;
#         ssl_stapling_verify on;
#         resolver_timeout 5s;
#         add_header X-Frame-Options DENY;
#         add_header X-Content-Type-Options nosniff;

        client_max_body_size 20m;
    }

    # CDN
    server {
        listen 80;
        server_name cdn.localhost;
        root /srv/app/public;

        location ~* \.(jpg|jpeg|png|gif|ico)$ {
            expires 365d;
        }

        client_max_body_size 20m;
    }
}